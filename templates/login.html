<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Mobatai Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #1E1E1E; padding: 40px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-weight: 700; letter-spacing: 1px; margin-bottom: 25px; }
        h2 span { color: #00E5FF; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background-color: #121212; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: #00E5FF; }
        button { width: 100%; padding: 12px; background-color: #00E5FF; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background-color: #00B3CC; transform: translateY(-2px); }
        .error { color: #FF1744; font-size: 0.85rem; margin-bottom: 15px; background: rgba(255,23,68,0.1); padding: 8px; border-radius: 5px; }
        .toggle-link { display: block; margin-top: 20px; color: #A0A0A0; font-size: 0.85rem; text-decoration: none; transition: 0.2s; }
        .toggle-link:hover { color: #00E5FF; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Mobatai<span>Vault</span></h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('register' if mode == 'register' else 'login') }}">
            <input type="text" name="username" placeholder="Usuario" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit">
                {{ 'Crear cuenta' if mode == 'register' else 'Entrar' }}
            </button>
        </form>

        {% if mode == 'login' %}
            <a href="{{ url_for('register') }}" class="toggle-link">¿No tenés cuenta? Registrate acá</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="toggle-link">¿Ya tenés cuenta? Iniciá sesión</a>
        {% endif %}
    </div>
</body>
</html>
