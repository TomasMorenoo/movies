<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobatai Vault</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00E5FF">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3658/3658959.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #121212;      
            --bg-card: #1E1E1E;      
            --accent: #00E5FF;       
            --text-main: #FFFFFF;    
            --text-muted: #A0A0A0;   
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
        .navbar-custom { background-color: rgba(18, 18, 18, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 1rem 0; }
        .navbar-brand { font-weight: 700; letter-spacing: 1.5px; font-size: 1.5rem; color: var(--text-main) !important; }
        .navbar-brand span { color: var(--accent); }
        .btn-custom-outline { border: 1px solid rgba(255, 255, 255, 0.2); color: var(--text-main); transition: all 0.3s ease; font-weight: 600; }
        .btn-custom-outline:hover { border-color: var(--accent); background: rgba(0, 229, 255, 0.1); color: var(--accent); }
        .btn-accent { background-color: var(--accent); color: #000; border: none; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2); }
        .btn-accent:hover { background-color: #00B3CC; color: #000; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4); }
        .form-control { background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .form-control:focus { background-color: var(--bg-card); border-color: var(--accent); box-shadow: 0 0 0 0.25rem rgba(0, 229, 255, 0.25); color: var(--text-main); }
        .card, .form-section-card { background-color: var(--bg-card) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }
        .text-muted { color: var(--text-muted) !important; }
        .text-warning { color: var(--accent) !important; }
        
        /* Oculta la flechita por defecto del menú desplegable */
        .hide-toggle::after { display: none !important; }
        
        /* Estilos para el menú desplegable oscuro */
        .dropdown-menu-custom { background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dropdown-item { color: var(--text-main); transition: background 0.2s; }
        .dropdown-item:hover { background-color: rgba(255, 255, 255, 0.05); color: var(--accent); }
    </style>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }</script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom mb-5 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            
            <a class="navbar-brand m-0" href="{{ url_for('index') }}">Mobatai<span>Vault</span></a>
            
            <div class="d-flex gap-2 align-items-center">
                {% if session.get('username') %}
                    
                    <a class="btn btn-outline-info btn-sm px-3 rounded-pill fw-bold shadow-sm" href="{{ url_for('oracle') }}">👁️ Oráculo</a>
                    <a class="btn btn-custom-outline btn-sm px-3 rounded-pill shadow-sm" href="{{ url_for('form') }}">Nueva</a>
                    
                    <div class="nav-item dropdown ms-2" style="list-style: none;">
                        <a class="nav-link dropdown-toggle hide-toggle d-flex align-items-center p-0" href="#" id="userMenu" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="text-decoration: none;">
                            
                            <div class="rounded-circle bg-info text-dark d-flex align-items-center justify-content-center fw-bold shadow" style="width: 40px; height: 40px; font-size: 1.1rem; border: 2px solid var(--accent);">
                                {{ session.get('username', 'US')[:2] | upper }}
                            </div>
                        </a>
                        
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-custom shadow-lg mt-3" aria-labelledby="userMenu">
                            <li>
                                <span class="dropdown-item-text text-info fw-bold border-bottom border-secondary pb-2 mb-2 d-block text-center">
                                    Hola, {{ session.get('username') }}
                                </span>
                            </li>
                            
                            <li><a class="dropdown-item py-2" href="{{ url_for('export_csv') }}">📥 Exportar a CSV</a></li>
                            <li><hr class="dropdown-divider border-secondary"></li>
                            <li><a class="dropdown-item text-danger py-2 fw-bold" href="{{ url_for('logout') }}">🚪 Salir</a></li>
                        </ul>
                    </div>
                    
                {% endif %}
            </div>
            
        </div>
    </nav>
    
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
