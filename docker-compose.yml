version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mobatai_db
    ports:
      - "5432:5432"
    environment:
      # Docker lee estos valores directamente de tu archivo .env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  movie_app:
    build: .
    container_name: mobatai_vault
    ports:
      - "5001:5000"
    environment:
      # URL dinámica para el VPS (fijate que acá dice @db en vez de localhost)
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data: